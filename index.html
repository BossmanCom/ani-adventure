<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ani Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #gameCanvas {
      background: #2a2a3e;
      border: 3px solid #ff8800;
      image-rendering: pixelated;
      max-width: 100%;
    }
    .info {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div class="info">Ani Adventure - Starter Scene</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Temporary direct raw URL so it definitely loads
    const ani = new Image();
    ani.crossOrigin = 'anonymous';
    ani.src = 'https://raw.githubusercontent.com/BossmanCom/ani-adventure/main/ani.png';

    let aniX = 220;
    let aniY = 80;
    let aniScale = 0.42;

    ani.onload = () => {
      console.log('Ani loaded successfully');
      draw();
    };

    ani.onerror = (e) => {
      console.error('Failed to load Ani', e);
      ctx.fillStyle = '#2a2a3e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff8800';
      ctx.font = '18px Courier New';
      ctx.fillText('Still cannot load ani.png', 190, 220);
      ctx.font = '13px Courier New';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Check browser console (F12) for error', 170, 250);
    };

    function draw() {
      // Simple room background
      ctx.fillStyle = '#3d2b1f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Back wall
      ctx.fillStyle = '#5c4033';
      ctx.fillRect(0, 0, canvas.width, 280);

      // Floor boards
      ctx.strokeStyle = '#2a1a10';
      ctx.lineWidth = 2;
      for (let y = 280; y < canvas.height; y += 28) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw Ani
      if (ani.complete && ani.naturalWidth > 0) {
        const w = ani.width * aniScale;
        const h = ani.height * aniScale;
        ctx.drawImage(ani, aniX, aniY, w, h);

        // Simple ground shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(aniX + w/2, aniY + h - 10, w*0.35, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Click to move
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      aniX = mx - 80;
      aniY = Math.min(Math.max(my - 180, 30), 150);
      draw();
    });
  </script>
</body>
</html>
