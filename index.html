<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ani Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #gameCanvas {
      background: #2a2a3e;
      border: 3px solid #ff8800;
      image-rendering: pixelated;
      max-width: 100%;
    }
    .info {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div class="info" id="roomLabel">Ani's Room</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const roomLabel = document.getElementById('roomLabel');

    const sheet = new Image();
    sheet.src = 'ani_sheet.png?' + Date.now();

    let frameW = 512, frameH = 512;
    const IDLE_FRAME = 2, WALK_FRAMES = [0, 3];
    const off = document.createElement('canvas');
    const offCtx = off.getContext('2d');

    const ani = {
      x: 270, y: 160, targetX: 270, targetY: 160,
      speed: 2.8, facing: 1, frame: IDLE_FRAME, animTimer: 0, scale: 0.36
    };

    let currentRoom = 'room';

    const rooms = {
      room: {
        name: "Ani's Room",
        doors: [{ x: 545, y: 110, w: 80, h: 170, target: 'hallway', spawnX: 90, spawnY: 160 }]
      },
      hallway: {
        name: 'Hallway',
        doors: [
          { x: 15, y: 110, w: 75, h: 170, target: 'room', spawnX: 480, spawnY: 160 },
          { x: 550, y: 110, w: 75, h: 170, target: 'outside', spawnX: 80, spawnY: 200 },
          { x: 270, y: 110, w: 100, h: 170, target: 'kitchen', spawnX: 300, spawnY: 180 }
        ]
      },
      kitchen: {
        name: 'Kitchen',
        doors: [{ x: 270, y: 380, w: 100, h: 70, target: 'hallway', spawnX: 300, spawnY: 140 }]
      },
      outside: {
        name: 'City Street',
        doors: [
          { x: 55, y: 190, w: 70, h: 90, target: 'hallway', spawnX: 500, spawnY: 160 },
          { x: 195, y: 194, w: 50, h: 70, target: 'weaponStore', spawnX: 120, spawnY: 220 },
          { x: 355, y: 194, w: 50, h: 70, target: 'clothingStore', spawnX: 120, spawnY: 220 },
          { x: 525, y: 194, w: 50, h: 70, target: 'bar', spawnX: 100, spawnY: 220 }
        ]
      },
      weaponStore: {
        name: 'Weapon Store',
        doors: [{ x: 55, y: 220, w: 55, h: 80, target: 'outside', spawnX: 210, spawnY: 210 }]
      },
      clothingStore: {
        name: 'Clothing Store',
        doors: [{ x: 55, y: 220, w: 55, h: 80, target: 'outside', spawnX: 370, spawnY: 210 }]
      },
      bar: {
        name: 'The Bar',
        doors: [{ x: 35, y: 220, w: 55, h: 80, target: 'outside', spawnX: 540, spawnY: 210 }]
      }
    };

    sheet.onload = () => {
      frameW = sheet.width / 2;
      frameH = sheet.height / 2;
      off.width = frameW; off.height = frameH;
      requestAnimationFrame(loop);
    };

    function getCleanFrame(frameIndex) {
      const col = frameIndex % 2, row = Math.floor(frameIndex / 2);
      offCtx.clearRect(0, 0, frameW, frameH);
      offCtx.drawImage(sheet, col * frameW, row * frameH, frameW, frameH, 0, 0, frameW, frameH);
      const imgData = offCtx.getImageData(0, 0, frameW, frameH);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) data[i+3] = 0;
      }
      offCtx.putImageData(imgData, 0, 0);
      return off;
    }

    function changeRoom(target, spawnX, spawnY) {
      currentRoom = target;
      ani.x = spawnX; ani.y = spawnY;
      ani.targetX = spawnX; ani.targetY = spawnY;
      roomLabel.textContent = rooms[currentRoom].name;
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
      const my = (e.clientY - rect.top) * (canvas.height / rect.height);

      for (const d of rooms[currentRoom].doors) {
        if (mx >= d.x && mx <= d.x + d.w && my >= d.y && my <= d.y + d.h) {
          changeRoom(d.target, d.spawnX, d.spawnY);
          return;
        }
      }
      ani.targetX = mx - (frameW * ani.scale) / 2;
      ani.targetY = Math.min(Math.max(my - (frameH * ani.scale) * 0.65, 30), 300);
    });

    function update() {
      const dx = ani.targetX - ani.x, dy = ani.targetY - ani.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 3) {
        ani.x += (dx / dist) * ani.speed;
        ani.y += (dy / dist) * ani.speed;
        if (dx > 0.5) ani.facing = 1;
        if (dx < -0.5) ani.facing = -1;
        ani.animTimer++;
        if (ani.animTimer > 12) {
          ani.animTimer = 0;
          ani.frame = (ani.frame === WALK_FRAMES[0]) ? WALK_FRAMES[1] : WALK_FRAMES[0];
        }
      } else {
        ani.frame = IDLE_FRAME;
        ani.x = ani.targetX; ani.y = ani.targetY;
      }
    }

    // ===== SHARED HELPERS =====
    function shadeColor(hex, amt) {
      const num = parseInt(hex.replace('#', ''), 16);
      let r = Math.max(0, Math.min(255, (num >> 16) + amt));
      let g = Math.max(0, Math.min(255, ((num >> 8) & 0xFF) + amt));
      let b = Math.max(0, Math.min(255, (num & 0xFF) + amt));
      return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    function drawDoor(x, y, w, h) {
      ctx.fillStyle = '#3d2914';
      ctx.fillRect(x-5, y-5, w+10, h+10);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#5c3317';
      ctx.lineWidth = 2;
      ctx.strokeRect(x+8, y+10, w-16, h/2-16);
      ctx.strokeRect(x+8, y+h/2+6, w-16, h/2-18);
      ctx.fillStyle = '#d4af37';
      ctx.beginPath(); ctx.arc(x+w-14, y+h/2, 6, 0, Math.PI*2); ctx.fill();
    }

    function drawShopDoor(doorX, doorY, frameColor) {
      ctx.fillStyle = frameColor;
      ctx.fillRect(doorX, doorY, 50, 70);
      ctx.fillStyle = shadeColor(frameColor, -15);
      ctx.fillRect(doorX+4, doorY+4, 42, 62);
      ctx.fillStyle = '#e8d97a';
      ctx.beginPath(); ctx.arc(doorX+38, doorY+35, 3, 0, Math.PI*2); ctx.fill();
    }

    function drawSword(cx, cy, angle, color) {
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
      ctx.fillStyle = color; ctx.fillRect(-3, -30, 6, 34);
      ctx.beginPath(); ctx.moveTo(-3,-30); ctx.lineTo(0,-38); ctx.lineTo(3,-30); ctx.fill();
      ctx.fillStyle = '#8a6a3a'; ctx.fillRect(-8, 3, 16, 4);
      ctx.fillStyle = '#5a3b28'; ctx.fillRect(-2, 6, 4, 12);
      ctx.restore();
    }

    function drawShirt(cx, cy, color) {
      ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, cy-6); ctx.lineTo(cx, cy); ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillRect(cx-6, cy, 12, 14);
      ctx.fillRect(cx-10, cy, 4, 8);
      ctx.fillRect(cx+6, cy, 4, 8);
    }

    function drawBarrel(cx, cy) {
      ctx.fillStyle = '#8a6a3a'; ctx.fillRect(cx-10, cy, 20, 22);
      ctx.strokeStyle = '#4a3a2a'; ctx.lineWidth = 2;
      ctx.strokeRect(cx-10, cy+4, 20, 3);
      ctx.strokeRect(cx-10, cy+15, 20, 3);
    }

    function drawCounter(x, y, w, h, color) {
      ctx.fillStyle = color; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = shadeColor(color, 20); ctx.fillRect(x, y, w, 10);
      ctx.strokeStyle = shadeColor(color, -20); ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
    }

    function drawBook(x, y) {
      ctx.fillStyle = '#8a3a3a'; ctx.fillRect(x, y, 26, 18);
      ctx.fillStyle = '#e8d9c9'; ctx.fillRect(x+2, y+2, 22, 3);
      ctx.strokeStyle = '#5a2020'; ctx.lineWidth = 1; ctx.strokeRect(x, y, 26, 18);
    }

    function drawSwordFlat(x, y, len, color) {
      ctx.fillStyle = color; ctx.fillRect(x, y, len-20, 5);
      ctx.beginPath(); ctx.moveTo(x+len-20, y); ctx.lineTo(x+len-12, y+2.5); ctx.lineTo(x+len-20, y+5); ctx.fill();
      ctx.fillStyle = '#8a6a3a'; ctx.fillRect(x-4, y-4, 4, 13);
      ctx.fillStyle = '#5a3b28'; ctx.fillRect(x-16, y-1, 12, 7);
    }

    function drawShelfWithSwords(x, y, w, h) {
      ctx.fillStyle = '#3d2818'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = '#5a3b28'; ctx.fillRect(x+6, y+6, w-12, h-12);
      const rowH = (h-20)/2;
      ctx.fillStyle = '#3d2818'; ctx.fillRect(x+6, y+10+rowH, w-12, 4);
      drawSwordFlat(x+20, y + rowH*0.5 + 6, w-40, '#c9c9d0');
      drawSwordFlat(x+20, y + rowH*1.5 + 12, w-40, '#d4af6a');
    }

    function drawClothingRack(x, y, w) {
      ctx.strokeStyle = '#3d2818'; ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x, y+90);
      ctx.moveTo(x+w, y); ctx.lineTo(x+w, y+90);
      ctx.moveTo(x, y); ctx.lineTo(x+w, y);
      ctx.stroke();
      const colors = ['#d9556b','#5a8fc9','#e8c94a','#7ac98f','#a86bc9'];
      const spacing = w / 6;
      for (let i = 0; i < 6; i++) drawShirt(x + spacing*i + spacing/2, y+6, colors[i%5]);
    }

    function drawBottle(x, bottomY, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, bottomY-26, 8, 26);
      ctx.fillRect(x+2, bottomY-32, 4, 6);
    }

    function drawBottleShelf(x, y, w) {
      ctx.fillStyle = '#5a3b28';
      ctx.fillRect(x, y+40, w, 6);
      ctx.fillRect(x, y+80, w, 6);
      const colors = ['#4a7a4a','#7a3a3a','#4a5a8a','#8a7a3a'];
      for (let row = 0; row < 2; row++) {
        for (let i = 0; i < 7; i++) {
          drawBottle(x + 10 + i*(w/7), y + row*40 + 40, colors[(i+row)%4]);
        }
      }
    }

    function drawChair(x, y) {
      ctx.fillStyle = '#4a3020'; ctx.fillRect(x-10, y-6, 20, 16);
      ctx.fillStyle = '#3d2818'; ctx.fillRect(x-10, y-20, 20, 8);
    }

    function drawTableAndChairs(x, y) {
      ctx.fillStyle = '#6a4a30';
      ctx.beginPath(); ctx.ellipse(x, y, 34, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d2818'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#3d2818'; ctx.fillRect(x-4, y+4, 8, 20);
      drawChair(x-50, y+10); drawChair(x+50, y+10); drawChair(x, y+40);
    }

    // ===== EXTERIOR SHOPS =====
    function drawWeaponStore(x, groundY, w, h) {
      const y = groundY - h;
      ctx.fillStyle = '#5a4a42'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = shadeColor('#5a4a42', -20); ctx.fillRect(x, y, w, 8);
      ctx.fillStyle = '#3d2818'; ctx.fillRect(x+10, y+14, w-20, 24);
      ctx.fillStyle = '#d9b25a'; ctx.font = '12px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('WEAPONS', x+w/2, y+31); ctx.textAlign = 'left';
      ctx.fillStyle = '#e8d98b';
      ctx.fillRect(x+12, y+h-90, 18, 22); ctx.fillRect(x+w-30, y+h-90, 18, 22);
      drawSword(x+w/2-6, y+h-80, -0.5, '#c9c9d0');
      drawSword(x+w/2+6, y+h-80, 0.5, '#c9c9d0');
      drawShopDoor(x+w/2-25, groundY-70, '#3a2a20');
    }

    function drawClothingStore(x, groundY, w, h) {
      const y = groundY - h;
      ctx.fillStyle = '#a86b8a'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = shadeColor('#a86b8a', -20); ctx.fillRect(x, y, w, 8);
      const awningY = y + h - 96;
      ctx.fillStyle = '#e8d98b'; ctx.fillRect(x+8, awningY, w-16, 10);
      ctx.fillStyle = '#d9556b';
      for (let i = 0; i < w-16; i += 12) ctx.fillRect(x+8+i, awningY, 6, 10);
      ctx.fillStyle = '#f2f2ea';
      for (let i = 0; i < w-16; i += 12) {
        ctx.beginPath(); ctx.arc(x+8+i+6, awningY+10, 5, 0, Math.PI); ctx.fill();
      }
      ctx.fillStyle = '#cfe8ec'; ctx.fillRect(x+12, awningY+12, w-24, 40);
      drawShirt(x+24, awningY+20, '#d9556b');
      drawShirt(x+48, awningY+20, '#5a8fc9');
      drawShirt(x+72, awningY+20, '#e8c94a');
      ctx.fillStyle = '#3d2818'; ctx.font = '11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('CLOTHES', x+w/2, y+20); ctx.textAlign = 'left';
      drawShopDoor(x+w/2-25, groundY-70, '#7a4a5a');
    }

    function drawBarShop(x, groundY, w, h) {
      const y = groundY - h;
      ctx.fillStyle = '#4a3a2a'; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = shadeColor('#4a3a2a', -20); ctx.fillRect(x, y, w, 8);
      ctx.fillStyle = '#f2c14a';
      ctx.fillRect(x+14, y+h-90, 20, 24); ctx.fillRect(x+w-34, y+h-90, 20, 24);
      ctx.strokeStyle = '#4a3a2a'; ctx.lineWidth = 2;
      [14, w-34].forEach(off => {
        ctx.beginPath();
        ctx.moveTo(x+off, y+h-78); ctx.lineTo(x+off+20, y+h-78);
        ctx.moveTo(x+off+10, y+h-90); ctx.lineTo(x+off+10, y+h-66);
        ctx.stroke();
      });
      ctx.strokeStyle = '#2a1f18'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+w/2, y+6); ctx.lineTo(x+w/2, y-10); ctx.stroke();
      ctx.fillStyle = '#2a1f18'; ctx.fillRect(x+w/2-30, y-26, 60, 20);
      ctx.fillStyle = '#e8c94a'; ctx.font = '11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('THE BAR', x+w/2, y-12); ctx.textAlign = 'left';
      drawBarrel(x+w/2-45, groundY-22); drawBarrel(x+w/2+33, groundY-22);
      drawShopDoor(x+w/2-25, groundY-70, '#2a1f18');
    }

    // ===== INTERIORS =====
    function drawWeaponStoreInterior() {
      const W = canvas.width, H = canvas.height;
      ctx.fillStyle = '#6b5a4a'; ctx.fillRect(0, 0, W, H*0.75);
      ctx.fillStyle = '#8a6a4a'; ctx.fillRect(0, H*0.75, W, H*0.25);
      ctx.strokeStyle = '#6a4a30'; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, H*0.75); ctx.lineTo(x, H); ctx.stroke();
      }
      drawShelfWithSwords(60, H*0.12, 200, H*0.3);
      drawShelfWithSwords(320, H*0.12, 200, H*0.3);
      drawCounter(W-260, H*0.55, 200, 90, '#5a3b28');
      drawBook(W-200, H*0.55-14);
      drawShopDoor(55, 220, '#3a2a20');
      ctx.fillStyle = '#f2d98b'; ctx.font = '12px Courier New';
      ctx.fillText('◄ Street', 40, 210);
    }

    function drawClothingStoreInterior() {
      const W = canvas.width, H = canvas.height;
      ctx.fillStyle = '#c48fae'; ctx.fillRect(0, 0, W, H*0.75);
      ctx.fillStyle = '#e8d9c9'; ctx.fillRect(0, H*0.75, W, H*0.25);
      ctx.strokeStyle = '#c9b89a'; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, H*0.75); ctx.lineTo(x, H); ctx.stroke();
      }
      drawClothingRack(60, H*0.2, 220);
      drawClothingRack(340, H*0.2, 220);
      drawCounter(W-260, H*0.55, 200, 90, '#7a4a5a');
      drawBook(W-200, H*0.55-14);
      drawShopDoor(55, 220, '#7a4a5a');
      ctx.fillStyle = '#3d2818'; ctx.font = '12px Courier New';
      ctx.fillText('◄ Street', 40, 210);
    }

    function drawBarInterior() {
      const W = canvas.width, H = canvas.height;
      ctx.fillStyle = '#3a2a20'; ctx.fillRect(0, 0, W, H*0.75);
      ctx.fillStyle = '#4a3a2a'; ctx.fillRect(0, H*0.75, W, H*0.25);
      ctx.strokeStyle = '#2a1f18'; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, H*0.75); ctx.lineTo(x, H); ctx.stroke();
      }
      drawCounter(W-260, H*0.5, 200, 100, '#2a1f18');
      drawBottleShelf(W-250, H*0.18, 180);
      drawBottle(W-240, H*0.5+4, '#8a3a3a');
      drawBottle(W-224, H*0.5+4, '#3a5a8a');
      drawBottle(W-208, H*0.5+4, '#5a8a4a');
      drawTableAndChairs(130, H*0.68);
      drawTableAndChairs(320, H*0.7);
      drawShopDoor(35, 220, '#2a1f18');
      ctx.fillStyle = '#e8c94a'; ctx.font = '12px Courier New';
      ctx.fillText('◄ Street', 20, 210);
    }

    // ===== OTHER ROOMS =====
    function drawRoom() {
      ctx.fillStyle = '#3d2b1f'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#5c4033'; ctx.fillRect(0,0,canvas.width,250);
      ctx.strokeStyle = '#2a1a10'; ctx.lineWidth = 2;
      for (let y=250; y<canvas.height; y+=24) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
      }
      ctx.fillStyle = '#4a2c17'; ctx.fillRect(28,155,18,120);
      ctx.fillStyle = '#6b3e26'; ctx.fillRect(40,195,165,70);
      ctx.fillStyle = '#c45c26'; ctx.fillRect(55,200,140,55);
      ctx.fillStyle = '#e8d5b7'; ctx.fillRect(58,205,48,22);
      ctx.fillStyle = '#5c4033'; ctx.fillRect(400,150,120,130);
      ctx.fillStyle = '#7a5c45'; ctx.fillRect(395,145,130,12);
      drawDoor(545,110,80,170);
    }

    function drawHallway() {
      ctx.fillStyle = '#2c241b'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#4a3b2f'; ctx.fillRect(0,0,canvas.width,250);
      ctx.strokeStyle = '#1a140e'; ctx.lineWidth = 2;
      for (let y=250; y<canvas.height; y+=22) {
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
      }
      ctx.fillStyle = '#3a2e24';
      ctx.fillRect(0,0,20,canvas.height); ctx.fillRect(620,0,20,canvas.height);
      drawDoor(15,110,75,170); drawDoor(550,110,75,170); drawDoor(270,110,100,170);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '12px Courier New';
      ctx.fillText('Kitchen', 290, 100); ctx.fillText('City', 570, 100);
    }

    function drawKitchen() {
      ctx.fillStyle = '#e8e8e8'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1;
      for (let x=0; x<canvas.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
      for (let y=0; y<canvas.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
      ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0,0,canvas.width,220);
      ctx.fillStyle = '#d0d0d0'; ctx.fillRect(40,200,560,50);
      ctx.fillStyle = '#b0b0b0'; ctx.fillRect(40,245,560,18);
      ctx.fillStyle = '#333'; ctx.fillRect(80,175,110,30);
      ctx.fillStyle = '#222'; ctx.fillRect(90,160,40,20); ctx.fillRect(140,160,40,20);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(110,170,12,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(160,170,12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#aaa'; ctx.fillRect(280,185,90,25);
      ctx.fillStyle = '#888'; ctx.fillRect(290,190,70,15);
      ctx.fillStyle = '#666'; ctx.fillRect(320,170,10,20); ctx.fillRect(310,168,30,6);
      ctx.fillStyle = '#ddd'; ctx.fillRect(420,80,80,90); ctx.fillRect(510,80,80,90);
      drawDoor(270,380,100,70);
    }

    function drawCity() {
      const W = canvas.width, H = canvas.height, groundY = H * 0.55;
      const sky = ctx.createLinearGradient(0, 0, 0, groundY);
      sky.addColorStop(0, '#6b7fb0'); sky.addColorStop(1, '#c9a8c2');
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, groundY);
      ctx.fillStyle = '#9a9a92'; ctx.fillRect(0, groundY, W, H*0.23);
      ctx.strokeStyle = '#7d7d74'; ctx.lineWidth = 2;
      for (let x=0; x<W; x+=60) { ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x,H*0.78); ctx.stroke(); }
      ctx.fillStyle = '#3a3a42'; ctx.fillRect(0, H*0.78, W, H*0.22);
      ctx.fillStyle = '#e8d97a';
      for (let x=10; x<W; x+=50) ctx.fillRect(x, H*0.78+(H*0.22)/2-3, 30, 6);
      drawWeaponStore(160, groundY, 130, H*0.38);
      drawClothingStore(310, groundY, 140, H*0.34);
      drawBarShop(470, groundY, 140, H*0.36);
      drawDoor(55, 190, 70, 90);
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '12px Courier New';
      ctx.fillText('◄ Hallway', 50, 180);
    }

    function draw() {
      if (currentRoom === 'room') drawRoom();
      else if (currentRoom === 'hallway') drawHallway();
      else if (currentRoom === 'kitchen') drawKitchen();
      else if (currentRoom === 'outside') drawCity();
      else if (currentRoom === 'weaponStore') drawWeaponStoreInterior();
      else if (currentRoom === 'clothingStore') drawClothingStoreInterior();
      else if (currentRoom === 'bar') drawBarInterior();

      const drawW = frameW * ani.scale, drawH = frameH * ani.scale;
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(ani.x + drawW/2, ani.y + drawH - 6, drawW*0.30, 10, 0, 0, Math.PI*2);
      ctx.fill();

      if (sheet.complete && sheet.naturalWidth > 0) {
        const clean = getCleanFrame(ani.frame);
        ctx.save();
        if (ani.facing === -1) {
          ctx.translate(ani.x + drawW, ani.y); ctx.scale(-1, 1);
          ctx.drawImage(clean, 0, 0, frameW, frameH, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(clean, 0, 0, frameW, frameH, ani.x, ani.y, drawW, drawH);
        }
        ctx.restore();
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
  </script>
</body>
</html>
