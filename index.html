<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ani Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #gameCanvas {
      background: #2a2a3e;
      border: 3px solid #ff8800;
      image-rendering: pixelated;
      max-width: 100%;
    }
    .info {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div class="info">Ani Adventure - Click to move</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ===== SPRITESHEET (2x2) =====
    const sheet = new Image();
    sheet.src = 'ani_sheet.png';

    let frameW = 512;
    let frameH = 512;

    const IDLE_FRAME = 2;
    const WALK_FRAMES = [0, 3];

    const off = document.createElement('canvas');
    const offCtx = off.getContext('2d');

    const ani = {
      x: 270,
      y: 180,
      targetX: 270,
      targetY: 180,
      speed: 2.8,
      facing: 1,
      frame: IDLE_FRAME,
      animTimer: 0,
      isMoving: false,
      scale: 0.38
    };

    sheet.onload = () => {
      frameW = sheet.width / 2;
      frameH = sheet.height / 2;
      off.width = frameW;
      off.height = frameH;
      requestAnimationFrame(loop);
    };

    sheet.onerror = () => {
      ctx.fillStyle = '#2a2a3e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff8800';
      ctx.font = '16px Courier New';
      ctx.fillText('Could not load ani_sheet.png', 180, 230);
    };

    function getCleanFrame(frameIndex) {
      const col = frameIndex % 2;
      const row = Math.floor(frameIndex / 2);

      offCtx.clearRect(0, 0, frameW, frameH);
      offCtx.drawImage(
        sheet,
        col * frameW, row * frameH, frameW, frameH,
        0, 0, frameW, frameH
      );

      const imgData = offCtx.getImageData(0, 0, frameW, frameH);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        if (r > 230 && g > 230 && b > 230) data[i+3] = 0;
      }

      offCtx.putImageData(imgData, 0, 0);
      return off;
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      ani.targetX = mx - (frameW * ani.scale) / 2;
      ani.targetY = Math.min(Math.max(my - (frameH * ani.scale) * 0.7, 40), 220);
    });

    function update() {
      const dx = ani.targetX - ani.x;
      const dy = ani.targetY - ani.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist > 3) {
        ani.isMoving = true;
        ani.x += (dx / dist) * ani.speed;
        ani.y += (dy / dist) * ani.speed;

        if (dx > 0.5) ani.facing = 1;
        if (dx < -0.5) ani.facing = -1;

        ani.animTimer++;
        if (ani.animTimer > 12) {
          ani.animTimer = 0;
          ani.frame = (ani.frame === WALK_FRAMES[0]) ? WALK_FRAMES[1] : WALK_FRAMES[0];
        }
      } else {
        ani.isMoving = false;
        ani.frame = IDLE_FRAME;
        ani.x = ani.targetX;
        ani.y = ani.targetY;
      }
    }

    // ===== FURNITURE =====
    function drawBed() {
      // Bed frame
      ctx.fillStyle = '#6b3e26';
      ctx.fillRect(40, 210, 180, 70);          // mattress base
      ctx.fillStyle = '#8b5a2b';
      ctx.fillRect(40, 200, 180, 18);          // top rail

      // Pillow
      ctx.fillStyle = '#e8d5b7';
      ctx.fillRect(50, 205, 50, 22);

      // Blanket
      ctx.fillStyle = '#c45c26';
      ctx.fillRect(100, 215, 110, 50);
      ctx.fillStyle = '#a3481e';
      ctx.fillRect(100, 215, 110, 8);          // fold line

      // Legs
      ctx.fillStyle = '#4a2c17';
      ctx.fillRect(45, 275, 12, 18);
      ctx.fillRect(200, 275, 12, 18);
    }

    function drawDresser() {
      // Main body
      ctx.fillStyle = '#5c4033';
      ctx.fillRect(480, 160, 120, 130);

      // Top
      ctx.fillStyle = '#6b4a38';
      ctx.fillRect(475, 155, 130, 12);

      // Drawers
      ctx.fillStyle = '#4a3328';
      ctx.fillRect(490, 180, 100, 28);
      ctx.fillRect(490, 220, 100, 28);
      ctx.fillRect(490, 260, 100, 22);

      // Handles
      ctx.fillStyle = '#c9a227';
      ctx.fillRect(530, 190, 20, 6);
      ctx.fillRect(530, 230, 20, 6);
      ctx.fillRect(530, 268, 20, 6);
    }

    function drawPlant() {
      // Pot
      ctx.fillStyle = '#8b4513';
      ctx.beginPath();
      ctx.moveTo(300, 250);
      ctx.lineTo(320, 250);
      ctx.lineTo(315, 280);
      ctx.lineTo(305, 280);
      ctx.closePath();
      ctx.fill();

      // Dirt
      ctx.fillStyle = '#3d2914';
      ctx.fillRect(304, 248, 12, 6);

      // Leaves
      ctx.fillStyle = '#2e8b57';
      ctx.beginPath();
      ctx.ellipse(310, 230, 18, 22, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(298, 235, 12, 16, -0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(322, 235, 12, 16, 0.4, 0, Math.PI*2);
      ctx.fill();
    }

    function draw() {
      // Room
      ctx.fillStyle = '#3d2b1f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Back wall
      ctx.fillStyle = '#5c4033';
      ctx.fillRect(0, 0, canvas.width, 260);

      // Floor boards
      ctx.strokeStyle = '#2a1a10';
      ctx.lineWidth = 2;
      for (let y = 260; y < canvas.height; y += 26) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Furniture (drawn before Ani so she appears in front)
      drawBed();
      drawDresser();
      drawPlant();

      const drawW = frameW * ani.scale;
      const drawH = frameH * ani.scale;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(ani.x + drawW / 2, ani.y + drawH - 8, drawW * 0.32, 11, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ani
      if (sheet.complete && sheet.naturalWidth > 0) {
        const clean = getCleanFrame(ani.frame);

        ctx.save();
        if (ani.facing === -1) {
          ctx.translate(ani.x + drawW, ani.y);
          ctx.scale(-1, 1);
          ctx.drawImage(clean, 0, 0, frameW, frameH, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(clean, 0, 0, frameW, frameH, ani.x, ani.y, drawW, drawH);
        }
        ctx.restore();
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
