<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ani Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #gameCanvas {
      background: #2a2a3e;
      border: 3px solid #ff8800;
      image-rendering: pixelated;
      max-width: 100%;
    }
    .info {
      position: fixed;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div class="info">Ani Adventure - Click to move</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const sheet = new Image();
    sheet.src = 'ani_sheet.png';

    let frameW = 512;
    let frameH = 512;

    const IDLE_FRAME = 2;
    const WALK_FRAMES = [0, 3];

    const off = document.createElement('canvas');
    const offCtx = off.getContext('2d');

    const ani = {
      x: 270,
      y: 160,
      targetX: 270,
      targetY: 160,
      speed: 2.8,
      facing: 1,
      frame: IDLE_FRAME,
      animTimer: 0,
      isMoving: false,
      scale: 0.36
    };

    sheet.onload = () => {
      frameW = sheet.width / 2;
      frameH = sheet.height / 2;
      off.width = frameW;
      off.height = frameH;
      requestAnimationFrame(loop);
    };

    sheet.onerror = () => {
      ctx.fillStyle = '#2a2a3e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff8800';
      ctx.font = '16px Courier New';
      ctx.fillText('Could not load ani_sheet.png', 180, 230);
    };

    function getCleanFrame(frameIndex) {
      const col = frameIndex % 2;
      const row = Math.floor(frameIndex / 2);

      offCtx.clearRect(0, 0, frameW, frameH);
      offCtx.drawImage(
        sheet,
        col * frameW, row * frameH, frameW, frameH,
        0, 0, frameW, frameH
      );

      const imgData = offCtx.getImageData(0, 0, frameW, frameH);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        if (r > 230 && g > 230 && b > 230) data[i+3] = 0;
      }

      offCtx.putImageData(imgData, 0, 0);
      return off;
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      ani.targetX = mx - (frameW * ani.scale) / 2;
      ani.targetY = Math.min(Math.max(my - (frameH * ani.scale) * 0.65, 30), 200);
    });

    function update() {
      const dx = ani.targetX - ani.x;
      const dy = ani.targetY - ani.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist > 3) {
        ani.isMoving = true;
        ani.x += (dx / dist) * ani.speed;
        ani.y += (dy / dist) * ani.speed;

        if (dx > 0.5) ani.facing = 1;
        if (dx < -0.5) ani.facing = -1;

        ani.animTimer++;
        if (ani.animTimer > 12) {
          ani.animTimer = 0;
          ani.frame = (ani.frame === WALK_FRAMES[0]) ? WALK_FRAMES[1] : WALK_FRAMES[0];
        }
      } else {
        ani.isMoving = false;
        ani.frame = IDLE_FRAME;
        ani.x = ani.targetX;
        ani.y = ani.targetY;
      }
    }

    // ===== FURNITURE =====
    function drawBed() {
      // Frame
      ctx.fillStyle = '#6b3e26';
      ctx.fillRect(30, 195, 170, 75);

      // Headboard
      ctx.fillStyle = '#5a3320';
      ctx.fillRect(30, 160, 20, 110);

      // Mattress / blanket
      ctx.fillStyle = '#c45c26';
      ctx.fillRect(50, 200, 140, 55);

      // Pillow
      ctx.fillStyle = '#e8d5b7';
      ctx.fillRect(55, 205, 45, 20);

      // Legs
      ctx.fillStyle = '#3d2415';
      ctx.fillRect(35, 265, 14, 20);
      ctx.fillRect(175, 265, 14, 20);
    }

    function drawDresser() {
      // Body
      ctx.fillStyle = '#5c4033';
      ctx.fillRect(470, 145, 130, 140);

      // Top surface
      ctx.fillStyle = '#7a5c45';
      ctx.fillRect(465, 140, 140, 14);

      // Drawers
      ctx.fillStyle = '#4a3328';
      ctx.fillRect(480, 165, 110, 30);
      ctx.fillRect(480, 205, 110, 30);
      ctx.fillRect(480, 245, 110, 28);

      // Handles
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(525, 176, 18, 7);
      ctx.fillRect(525, 216, 18, 7);
      ctx.fillRect(525, 255, 18, 7);
    }

    function drawPlant() {
      // Pot
      ctx.fillStyle = '#a0522d';
      ctx.beginPath();
      ctx.moveTo(310, 230);
      ctx.lineTo(340, 230);
      ctx.lineTo(335, 270);
      ctx.lineTo(315, 270);
      ctx.closePath();
      ctx.fill();

      // Rim
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(308, 225, 34, 8);

      // Leaves
      ctx.fillStyle = '#228b22';
      ctx.beginPath();
      ctx.ellipse(325, 200, 22, 28, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(308, 210, 14, 18, -0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(342, 210, 14, 18, 0.5, 0, Math.PI*2);
      ctx.fill();
    }

    function draw() {
      // Floor
      ctx.fillStyle = '#3d2b1f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Back wall
      ctx.fillStyle = '#5c4033';
      ctx.fillRect(0, 0, canvas.width, 250);

      // Floor boards
      ctx.strokeStyle = '#2a1a10';
      ctx.lineWidth = 2;
      for (let y = 250; y < canvas.height; y += 24) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Furniture
      drawBed();
      drawDresser();
      drawPlant();

      const drawW = frameW * ani.scale;
      const drawH = frameH * ani.scale;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(ani.x + drawW / 2, ani.y + drawH - 6, drawW * 0.30, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ani
      if (sheet.complete && sheet.naturalWidth > 0) {
        const clean = getCleanFrame(ani.frame);

        ctx.save();
        if (ani.facing === -1) {
          ctx.translate(ani.x + drawW, ani.y);
          ctx.scale(-1, 1);
          ctx.drawImage(clean, 0, 0, frameW, frameH, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(clean, 0, 0, frameW, frameH, ani.x, ani.y, drawW, drawH);
        }
        ctx.restore();
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
